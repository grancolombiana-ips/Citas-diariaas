<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grancolombiana Certificación Aeromédica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap');

  :root {
    --navy: #ffffff;
    --blue: #f0f0f0;
    --sky: #cccccc;
    --cyan: #111111;
    --gold: #333333;
    --white: #111111;
    --gray: #555555;
    --card: #f7f7f7;
    --success: #222222;
    --warning: #444444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: #111111;
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease;
  }

  .clinic-logo {
    height: 80px;
    max-width: 260px;
    object-fit: contain;
    margin: 0 auto 20px;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #111111;
  }

  h1 span { color: var(--cyan); }

  .subtitle {
    font-size: 0.9rem;
    color: var(--gray);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Progress */
  .progress-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
    animation: fadeIn 1s ease 0.3s both;
  }

  .step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--blue);
    border: 1px solid var(--sky);
    transition: all 0.4s ease;
  }

  .step-dot.active {
    background: var(--cyan);
    box-shadow: 0 0 8px #333333;
    transform: scale(1.3);
  }

  .step-dot.done {
    background: var(--success);
    border-color: var(--success);
  }

  /* Card */
  .card {
    background: #f7f7f7;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 16px;
    padding: 36px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #333333, transparent);
  }

  .step-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 12px;
    font-family: 'Rajdhani', sans-serif;
  }

  .question {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 28px;
    line-height: 1.3;
  }

  /* Options grid */
  .options {
    display: grid;
    gap: 12px;
  }

  .options.two-col { grid-template-columns: 1fr 1fr; }

  .option-btn {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--white);
    cursor: pointer;
    text-align: left;
    transition: all 0.25s ease;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    background: #eeeeee;
    border-color: var(--cyan);
    transform: translateX(4px);
  }

  .option-btn::after {
    content: '→';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.2s;
    color: var(--cyan);
  }

  .option-btn:hover::after { opacity: 1; }

  .option-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--cyan);
    display: block;
    margin-bottom: 3px;
  }

  .option-desc {
    font-size: 0.82rem;
    color: var(--gray);
    line-height: 1.5;
  }

  .option-desc b {
    color: var(--cyan);
    font-weight: 600;
  }

  /* Age input */
  .age-input-wrap {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 8px;
  }

  .age-input {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 14px 20px;
    color: var(--white);
    font-size: 1.4rem;
    font-family: 'Rajdhani', sans-serif;
    width: 140px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .age-input:focus { border-color: var(--cyan); }

  .confirm-btn {
    background: var(--cyan);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .confirm-btn:hover {
    background: #eeeeee;
    transform: scale(1.04);
  }

  /* Audio button */
  .audio-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #eeeeee;
    border: 1px solid rgba(0,0,0,0.25);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--cyan);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Source Sans 3', sans-serif;
    margin-bottom: 20px;
    transition: all 0.2s;
  }

  .audio-btn:hover { background: #dddddd; }

  .audio-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    animation: pulse 1.5s infinite;
  }

  /* Results */
  .results {
    animation: fadeUp 0.6s ease;
  }

  .patient-summary {
    background: #f0f0f0;
    border: 1px solid rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-label {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
  }

  .summary-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--cyan);
  }

  .results-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 16px;
  }

  .exam-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .exam-item {
    cursor: pointer;
    user-select: none;
  }
  .exam-item.done {
    opacity: 0.5;
    text-decoration: line-through;
  }
  .exam-checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid #111111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
    background: #ffffff;
  }
  .exam-item.done .exam-checkbox {
    background: #111111;
    color: #ffffff;
  }
  .exam-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #f0f0f0;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 12px 14px;
    animation: fadeUp 0.4s ease both;
  }

  .exam-icon {
    font-size: 1.2rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .exam-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
  }

  .exam-note {
    font-size: 0.75rem;
    color: var(--gray);
    margin-top: 2px;
  }

  .alert-box {
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .alert-warning {
    background: rgba(240,165,0,0.1);
    border: 1px solid rgba(240,165,0,0.3);
    color: var(--warning);
  }

  .alert-info {
    background: rgba(0,194,224,0.07);
    border: 1px solid rgba(0,0,0,0.2);
    color: var(--cyan);
  }

  .restart-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 14px;
    color: var(--gray);
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 24px;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .option-group-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    padding: 8px 4px 4px;
    border-bottom: 1px solid rgba(0,194,224,0.15);
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .option-group-label:first-child { margin-top: 0; }

  @media (max-width: 520px) {
    .exam-grid { grid-template-columns: 1fr; }
    .options.two-col { grid-template-columns: 1fr; }
    h1 { font-size: 1.4rem; }
    .question { font-size: 1.3rem; }
  }
</style>

<script>
// ─── State ───────────────────────────────────────────────
const state = {
  step: 0,
  licencia: null,
  primeraVez: null,
  vencido: false,
  nombre: '',
  documento: '',
  celular: '',
  edad: null
};

// ─── Exam Database ────────────────────────────────────────
const EXAMS = {
  medico:       { icon: '🩺', name: 'Médico Aeronáutico', note: 'Siempre requerido' },
  oftalmo_comp: { icon: '👁️', name: 'Oftalmología Completa', note: 'Val. completa' },
  oftalmo_aero: { icon: '👁️', name: 'Oftalmología', note: 'Val. aeronáutica' },
  optometria:   { icon: '🔭', name: 'Optometría', note: 'Val. optométrica' },
  orl:          { icon: '👂', name: 'ORL / Fonoaudiología', note: 'Otorrinolaringología' },
  cardiologia:  { icon: '❤️', name: 'Cardiología', note: 'Evaluación cardiovascular' },
  neurologia:   { icon: '🧠', name: 'Neurología', note: 'Evaluación neurológica' },
  psiquiatria:  { icon: '💬', name: 'Psiquiatría', note: 'Salud mental' },
  psicologia:   { icon: '🧩', name: 'Psicología', note: '5 procesos mentales superiores' },
  odontograma:  { icon: '🦷', name: 'Odontograma / RX Panorámica', note: 'Salud dental' },
  ch:           { icon: '🧪', name: 'Cuadro Hemático', note: 'Hemoleucograma' },
  orina:        { icon: '🔬', name: 'Parcial de Orina', note: 'Uroanálisis' },
  glicemia:     { icon: '💉', name: 'Glicemia', note: 'Glucosa en sangre' },
  audiometria:  { icon: '🔊', name: 'Audiometría', note: 'Umbral auditivo' },
  perfil:       { icon: '🫀', name: 'Perfil Lipídico', note: 'Colesterol y triglicéridos' },
  creatinina:   { icon: '🧫', name: 'Creatinina', note: 'Función renal' },
  ekg:          { icon: '📈', name: 'EKG / Electrocardiograma', note: 'Actividad cardíaca' },
  esfuerzo:     { icon: '🏃', name: 'Prueba de Esfuerzo', note: 'Test cardiovascular' },
  rayosx:       { icon: '🩻', name: 'Rayos X de Tórax', note: 'Solo primera vez' },
};

function getExams(licencia, primeraVez, edad, vencido) {
  let lista = [];
  const alerts = [];
  const lic = licencia;
  const pv = primeraVez;
  const e = edad;

  // ── CLASE 1: PCA · PTL · PCH · IDV ──
  if (lic === 'clase1') {
    // Siempre: médico aeronáutico + paraclínicos base
    lista.push('medico', 'ch', 'orina', 'glicemia', 'audiometria');
    lista.push('oftalmo_aero');

    // Primera vez (<40 o >=40): ORL, Cardio, Neuro, Psiq, Odonto, Psicología, Rayos X
    if (pv) {
      lista.push('orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'psicologia', 'rayosx');
      if (e >= 40) lista.push('esfuerzo');
      alerts.push({ type: 'info', text: '📌 Rayos X de tórax solo en la primera solicitud.' });
      if (vencido) {
        alerts.push({ type: 'warning', text: '📋 Certificado vencido > 2 años: se realizan todos los exámenes de primera vez. Las pruebas psicológicas son realizadas por Grancolombiana IPS.' });
      } else {
        alerts.push({ type: 'warning', text: '📋 Las pruebas psicológicas de primera vez deben ser subidas al SIGA por el respectivo Centro de Instrucción.' });
      }
    }

    // Renovación por edad
    if (!pv) {
      if (e >= 40 && e % 5 === 0) lista.push('esfuerzo');
      // <=24: solo base
      if (e >= 25 && e <= 29) lista.push('oftalmo_comp');
      if (e >= 30 && e <= 34) lista.push('oftalmo_comp');
      if (e >= 35 && e <= 35) lista.push('oftalmo_comp', 'perfil');
      if (e >= 36 && e <= 36) lista.push('oftalmo_comp', 'perfil', 'creatinina');
      if (e >= 37 && e <= 38) lista.push('oftalmo_comp', 'perfil', 'creatinina');
      if (e >= 39 && e <= 39) lista.push('oftalmo_comp', 'orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'perfil', 'creatinina');
      if (e >= 40 && e <= 44) lista.push('oftalmo_comp', 'orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'perfil', 'creatinina', 'ekg');
      if (e >= 45 && e <= 49) lista.push('oftalmo_comp', 'orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'perfil', 'creatinina', 'ekg');
      if (e >= 50 && e <= 54) lista.push('oftalmo_comp', 'orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'perfil', 'creatinina', 'ekg');
      if (e >= 55 && e <= 59) lista.push('oftalmo_comp', 'orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'perfil', 'creatinina', 'ekg');
      if (e >= 60 && e <= 64) {
        lista.push('oftalmo_comp', 'orl', 'cardiologia', 'neurologia', 'psiquiatria', 'odontograma', 'perfil', 'creatinina', 'ekg', 'psicologia');
        alerts.push({ type: 'warning', text: '⚠️ Psicología obligatoria cada 2 años desde los 60.' });
      }

// ─── Vigencia del Certificado (RAC 67 Colombia) ───────────
function getVigenciaMeses(licencia, edad) {
  // Clase 1: PCA, PTL
  if (licencia === 'clase1') {
    return edad < 40 ? 12 : 6;
  }
  // Clase 2: Pilotos privados PPA, PPL, APA, BAE — vigencia fija 36 meses
  if (licencia === 'clase2_piloto') {
    return 36;
  }
  // Clase 2: TCP Tripulante de Cabina — vigencia fija 3 años
  if (licencia === 'clase2_tcp') {
    return 36;
  }
  // Clase 3: CTA Controlador de Tránsito Aéreo
  if (licencia === 'clase3_cta') {
    return edad < 50 ? 24 : 12;
  }
  // Clase 3: OEA Operador de Estación Aeronáutica — vigencia fija 3 años
  if (licencia === 'clase3_oea') {
    return 36;
  }
  // Clase 3: PUL Piloto de Ultraliviano — vigencia fija 36 meses (privado)
  if (licencia === 'clase3_pul') {
    return 36;
  }
  return 12;
}

function calcFechaVencimiento(fechaExpedicion, meses) {
  const d = new Date(fechaExpedicion);
  d.setMonth(d.getMonth() + meses);
  return d;
}

function formatFecha(date) {
  return date.toLocaleDateString('es-CO', { day: '2-digit', month: 'long', year: 'numeric' });
}

function getDiasRestantes(fechaVenc) {
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const diff = fechaVenc - hoy;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function getVigenciaLabel(licencia) {
  const labels = {
    'clase1':        'Clase 1 — PCA · PCH · PTL · IDV',
    'clase2_piloto': 'Clase 2 — PPA · PPL · APA · BAE',
    'clase2_tcp':    'Clase 2 — TCP Tripulante de Cabina de Pasajeros',
    'clase3_cta':    'Clase 3 — CTA Controlador de Tránsito Aéreo',
    'clase3_oea':    'Clase 3 — OEA Operador de Estación Aeronáutica',
    'clase3_pul':    'Clase 3 — PUL Piloto de Ultraliviano'
  };
  return labels[licencia] || licencia;
}

let audioEnabled = false;

function toggleAudio() {
  audioEnabled = !audioEnabled;
  const btn = document.getElementById('toggleAudioBtn');
  if (btn) {
    btn.textContent = audioEnabled ? '🔊 Audio ON' : '🔇 Audio OFF';
    btn.style.background = audioEnabled ? 'rgba(0,194,224,0.2)' : 'rgba(255,255,255,0.07)';
  }
  if (!audioEnabled) window.speechSynthesis && window.speechSynthesis.cancel();
  render();
}

function speak(text, onEnd) {
  if (!audioEnabled || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'es-ES';
  utter.rate = 0.95;
  utter.pitch = 1;
  if (onEnd) utter.onend = onEnd;
  window.speechSynthesis.speak(utter);
}

// ─── STT (Reconocimiento de Voz) ─────────────────────────
let recognition = null;
let micActive = false;

function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'es-ES';
  r.continuous = false;
  r.interimResults = false;
  return r;
}

function startListening(onResult) {
  if (recognition) { try { recognition.abort(); } catch(e){} }
  recognition = initRecognition();
  if (!recognition) return;

  micActive = true;
  updateMicUI(true);

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.toLowerCase().trim();
    micActive = false;
    updateMicUI(false);
    onResult(transcript);
  };

  recognition.onerror = () => { micActive = false; updateMicUI(false); };
  recognition.onend = () => { micActive = false; updateMicUI(false); };

  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  if (recognition) { try { recognition.abort(); } catch(e){} }
  micActive = false;
  updateMicUI(false);
}

function updateMicUI(active) {
  const btn = document.getElementById('micBtn');
  if (!btn) return;
  if (active) {
    btn.style.background = 'rgba(255,77,109,0.2)';
    btn.style.borderColor = '#ff4d6d';
    btn.style.color = '#ff4d6d';
    btn.innerHTML = '<span class="dot" style="background:#ff4d6d"></span> Escuchando...';
  } else {
    btn.style.background = 'rgba(0,194,224,0.08)';
    btn.style.borderColor = 'rgba(0,194,224,0.25)';
    btn.style.color = 'var(--cyan)';
    btn.innerHTML = '<span class="dot"></span> 🎤 Hablar';
  }
}

// ─── Interpretar respuesta de voz por paso ────────────────
function interpretVoice(transcript, step) {
  const t = transcript;
  if (step === 0) {
    if (t.includes('primera') || t.includes('comercial') || t.includes('pca') || t.includes('pch') || t.includes('ptl') || t.includes('idv') || t.includes('ingeniero') || t.includes('transporte de línea') || t.includes('transporte de linea')) return 'clase1';
    if (t.includes('privado') || t.includes('ppa') || t.includes('ppl') || t.includes('planeador') || t.includes('alumno piloto') || t.includes('apa') || t.includes('bae') || t.includes('bombero')) return 'clase2_piloto';
    if (t.includes('tcp') || t.includes('tripulante') || t.includes('cabina')) return 'clase2_tcp';
    if (t.includes('controlador') || t.includes('tránsito') || t.includes('transito') || t.includes('cta')) return 'clase3_cta';
    if (t.includes('oea') || t.includes('operador') || t.includes('estación') || t.includes('estacion') || t.includes('radio')) return 'clase3_oea';
    if (t.includes('pul') || t.includes('ultraliviano') || t.includes('ultra')) return 'clase3_pul';
  }
  if (step === 1) {
    if (t.includes('sí') || t.includes('si') || t.includes('primera vez') || t.includes('primero') || t.includes('nuevo')) return true;
    if (t.includes('no') || t.includes('renovac') || t.includes('renov')) return false;
  }
  if (step === 2) {
    const nums = t.match(/\d+/);
    if (nums) return parseInt(nums[0]);
    // palabras numéricas comunes
    const palabras = {'diecisiete':17,'dieciocho':18,'diecinueve':19,'veinte':20,'veintiuno':21,'veintidos':22,'veintitres':23,'veinticuatro':24,'veinticinco':25,'veintiseis':26,'veintisiete':27,'veintiocho':28,'veintinueve':29,'treinta':30,'cuarenta':40,'cincuenta':50,'sesenta':60,'setenta':70,'ochenta':80};
    for (const [word, num] of Object.entries(palabras)) {
      if (t.includes(word)) return num;
    }
  }
  return null;
}

function handleVoiceStep0(transcript) {
  const result = interpretVoice(transcript, 0);
  const nombres = {
    'clase1':        'Clase 1, PCA, PCH, PTL e Ingeniero de Vuelo.',
    'clase2_piloto': 'Clase 2, Pilotos privados y Bombero Aeronáutico.',
    'clase2_tcp':    'Clase 2, Tripulante de Cabina.',
    'clase3_cta':    'Clase 3, Controlador de Tránsito Aéreo.',
    'clase3_oea':    'Clase 3, Operador de Estación Aeronáutica.',
    'clase3_pul':    'Clase 3, Piloto Ultraliviano.'
  };
  if (result) {
    speak('Entendido. ' + nombres[result]);
    setTimeout(() => { state.licencia = result; state.step = 1; render(); }, 1200);
  } else {
    speak('No entendí. Diga: Primera clase, Segunda clase piloto, TCP, Controlador, Operador de estación, o Ultraliviano.');
    setTimeout(() => startListeningForStep(0), 3000);
  }
}

function handleVoiceStep1(transcript) {
  const result = interpretVoice(transcript, 1);
  if (result !== null) {
    speak(result ? 'Primera vez.' : 'Renovación.');
    setTimeout(() => { state.primeraVez = result; state.step = 2; render(); }, 1000);
  } else {
    speak('No entendí. Di: Sí para primera vez, o No para renovación.');
    setTimeout(() => startListeningForStep(1), 2500);
  }
}

function handleVoiceStep2(transcript) {
  const result = interpretVoice(transcript, 2);
  if (result && result >= 16 && result <= 99) {
    speak(`${result} años. Perfecto.`);
    setTimeout(() => { state.edad = result; state.step = 3; render(); }, 1200);
  } else {
    speak('No entendí la edad. Por favor diga el número de años.');
    setTimeout(() => startListeningForStep(2), 2500);
  }
}

function startListeningForStep(step) {
  const handlers = [handleVoiceStep0, handleVoiceStep1, handleVoiceStep2];
  if (handlers[step]) startListening(handlers[step]);
}

function activateMic(step) {
  if (micActive) { stopListening(); return; }
  startListeningForStep(step);
}

function updateDots() {
  for (let i = 0; i <= 3; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'step-dot';
    if (i < state.step) d.classList.add('done');
    else if (i === state.step) d.classList.add('active');
  }
}

function render() {
  updateDots();
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (state.step === 0) renderStep0(app);
  else if (state.step === 1) renderStep1(app);
  else if (state.step === 2) renderStep2(app);
  else if (state.step === 3) renderResults(app);
}

function selectTipo(tipo) {
  if (tipo === 'primera') {
    state.primeraVez = true;
    state.vencido = false;
  } else if (tipo === 'vencido') {
    state.primeraVez = true;
    state.vencido = true;
  } else {
    state.primeraVez = false;
    state.vencido = false;
  }
  state.step++;
  render();
}

  app.innerHTML = `

      </div>
      <div id="voiceStatus" style="margin-top:12px;font-size:0.82rem;color:var(--gray);min-height:20px;"></div>
    </div>`;
  speak(q, () => setTimeout(() => startListeningForStep(2), 400));
  setTimeout(() => document.getElementById('ageInput').focus(), 100);
  document.getElementById('ageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmAge();
  });
}

function confirmAge() {
  const val = parseInt(document.getElementById('ageInput').value);
  if (!val || val < 16 || val > 99) {
    speak('Por favor ingrese una edad válida entre 16 y 99 años.');
    return;
  }
  state.edad = val;
  state.step = 3;
  render();
}

function getFestivosCol(year) {
  // Festivos fijos
  var fijos = [
    year+'-01-01', year+'-05-01', year+'-07-04', year+'-07-20',
    year+'-08-07', year+'-12-08', year+'-12-25'
  ];
  // Pascua (algoritmo Butcher)
  var a=year%19, b=Math.floor(year/100), c=year%100,
      d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25),
      g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30,
      i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7,
      m=Math.floor((a+11*h+22*l)/451),
      month=Math.floor((h+l-7*m+114)/31),
      day=((h+l-7*m+114)%31)+1;
  var pascua = new Date(year, month-1, day);
  // Festivos movibles basados en Pascua
  function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
  function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  var movPascua = [
    fmt(addDays(pascua,-3)), fmt(addDays(pascua,-2)),  // Jueves y Viernes Santo
    fmt(addDays(pascua,39)), fmt(addDays(pascua,49)), fmt(addDays(pascua,50))
  ];
  // Festivos "Ley Emiliani" (se mueven al lunes siguiente)
  function luneSig(mes,dia){
    var d=new Date(year,mes-1,dia);
    var dow=d.getDay();
    if(dow!==1) d.setDate(d.getDate()+((1-dow+7)%7));
    return fmt(d);
  }
  var emiliani = [
    luneSig(1,6), luneSig(3,19), luneSig(6,29), luneSig(8,15),
    luneSig(10,12), luneSig(11,1), luneSig(11,11)
  ];
  return fijos.concat(movPascua).concat(emiliani);
}

function validarFecha(input) {
  var val = input.value;
  if (!val) return;
  var d = new Date(val + 'T12:00:00');
  var dow = d.getDay(); // 0=Dom, 6=Sab
  var festivos = getFestivosCol(d.getFullYear());
  if (dow === 0 || dow === 6 || festivos.indexOf(val) !== -1) {
    alert('⚠️ No se atiende ese día. Por favor seleccione un día hábil (lunes a viernes, no festivo).');
    input.value = '';
  }
}

function enviarCita() {
  const nombre = state.nombre || '';
  const doc    = state.documento || '';
  const cel    = state.celular || '';
  const fecha  = document.getElementById('cita_fecha')?.value;

  if (!fecha) {
    alert('Por favor selecciona una fecha de asistencia.');
    return;
  }

  const fechaFormateada = new Date(fecha + 'T12:00:00').toLocaleDateString('es-CO', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });

  // 1. Guardar en Google Sheets y enviar correo
  if (SHEET_URL && SHEET_URL !== 'PEGA_AQUI_TU_URL') {
    const { lista: exams } = getExams(state.licencia, state.primeraVez, state.edad, state.vencido);
    const payload = {
      nombre:     nombre,
      documento:  doc,
      celular:    cel,
      email:      state.email || '',
      fechaNac:   state.fechaNac || '',
      siga:       state.siga || '',
      fechaCita:  fechaFormateada,
      licencia:   state.licencia || '-',
      edad:       state.edad     || '-',
      primeraVez: state.primeraVez,
      examenes:   exams.map(e => (EXAMS[e] ? EXAMS[e].name : e)).join(', ')
    };
    fetch(SHEET_URL, {
      method: 'POST',
      mode:   'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:   JSON.stringify(payload)
    }).catch(() => {});
  }

  // 2. Abrir WhatsApp con los datos prellenados
  const msg = `*Solicitud de Cita — Grancolombiana IPS*\n\n` +
    `👤 *Nombre:* ${nombre}\n` +
    `🪪 *Documento:* ${doc}\n` +
    `📱 *Celular:* ${cel}\n` +
    `📅 *Fecha de asistencia:* ${fechaFormateada}\n\n` +
    `🏥 *Licencia:* ${state.licencia || '-'}\n` +
    `🎂 *Edad:* ${state.edad || '-'} años`;

  window.open('https://wa.me/573012271729?text=' + encodeURIComponent(msg), '_blank');
}

let examsChecked = {};
let datosEnviados = false;

function toggleExam(key) {
  if (!datosEnviados) {
    alert('Por favor completa y envía tus datos primero antes de marcar los exámenes.');
    return;
  }
  const item = document.getElementById('exam-' + key);
  const chk  = document.getElementById('chk-' + key);
  if (!item) return;
  const done = item.classList.toggle('done');
  chk.textContent = done ? '✓' : '';
  examsChecked[key] = done;

  // Check if all exams are done
  const { lista } = getExams(state.licencia, state.primeraVez, state.edad, state.vencido);
  const allDone = lista.every(k => examsChecked[k]);

  if (allDone) {
    // Show completion message
    const existing = document.getElementById('completado-msg');
    if (!existing) {
      const msg = document.createElement('div');
      msg.id = 'completado-msg';
      msg.style.cssText = 'margin-top:16px;padding:16px;background:#111111;color:#ffffff;border-radius:10px;text-align:center;font-family:Rajdhani,sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1px;';
      msg.innerHTML = '✅ Todos los exámenes completados!<br><small style="font-weight:400;font-size:0.85rem;">Enviando registro a Google Sheets...</small>';
      document.getElementById('exam-grid-container')?.appendChild(msg);
    }

    // Send to Google Sheets
    const nombre = state.nombre || '';
    const doc    = state.documento || '';
    const cel    = state.celular || '';
    const hoy    = new Date().toLocaleDateString('es-CO', { day: '2-digit', month: 'long', year: 'numeric' });

    if (SHEET_URL && SHEET_URL !== 'PEGA_AQUI_TU_URL') {
      fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre:     nombre,
          documento:  doc,
          celular:    cel,
          fechaCita:  hoy,
          licencia:   state.licencia || '-',
          edad:       state.edad || '-',
          primeraVez: state.primeraVez,
          estado:     'COMPLETADO'
        })
      }).catch(() => {});
    }
  }
}
